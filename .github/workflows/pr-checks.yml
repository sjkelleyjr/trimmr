# Runs full CI on pull requests and posts (or updates) a summary comment on the PR.
# Note: PRs from forks receive a read-only GITHUB_TOKEN by default; commenting may be blocked
# unless the repo enables “Workflow permissions” → read and write for workflows from forks.

name: PR checks

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit chrome

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Unit tests (coverage)
        id: vitest
        continue-on-error: true
        run: npm run test:coverage

      - name: E2E (Playwright)
        id: e2e
        continue-on-error: true
        run: npm run test:e2e

      - name: Comment on PR with results
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- trimmr-ci-pr-comment -->";
            const outcomes = {
              typecheck: "${{ steps.typecheck.outcome }}",
              lint: "${{ steps.lint.outcome }}",
              vitest: "${{ steps.vitest.outcome }}",
              e2e: "${{ steps.e2e.outcome }}",
            };

            const icon = (o) =>
              ({ success: "✅", failure: "❌", cancelled: "⚠️", skipped: "⏭️" }[o] ?? "❓");

            const row = (label, key) =>
              `| ${label} | ${icon(outcomes[key])} \`${outcomes[key]}\` |`;

            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const allOk = Object.values(outcomes).every((o) => o === "success");

            const body = [
              marker,
              "## CI results",
              "",
              `Commit \`${sha}\` · [View workflow run](${runUrl})`,
              "",
              "| Step | Result |",
              "|------|--------|",
              row("Typecheck", "typecheck"),
              row("Lint", "lint"),
              row("Vitest (coverage)", "vitest"),
              row("Playwright E2E", "e2e"),
              "",
              allOk
                ? "**All checks passed.**"
                : "**Some checks failed.** Open the workflow run for logs and failure details.",
            ].join("\n");

            const prNumber = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find((c) => c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }

      - name: Fail if any check failed
        if: always()
        run: |
          echo "typecheck: ${{ steps.typecheck.outcome }}"
          echo "lint: ${{ steps.lint.outcome }}"
          echo "vitest: ${{ steps.vitest.outcome }}"
          echo "e2e: ${{ steps.e2e.outcome }}"
          if [ "${{ steps.typecheck.outcome }}" != "success" ] || \
             [ "${{ steps.lint.outcome }}" != "success" ] || \
             [ "${{ steps.vitest.outcome }}" != "success" ] || \
             [ "${{ steps.e2e.outcome }}" != "success" ]; then
            exit 1
          fi
